apiVersion: v1
kind: ConfigMap
metadata:
  name: m5paper-nginx-config
  namespace: default
data:
  default.conf: |
    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index output.jpg;
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: m5paper-nginx
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: m5paper-nginx
  template:
    metadata:
      labels:
        app: m5paper-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: data
              mountPath: /usr/share/nginx/html
              readOnly: true
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: m5paper-dashboard
        - name: nginx-config
          configMap:
            name: m5paper-nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: m5paper-nginx
  namespace: default
spec:
  type: NodePort
  selector:
    app: m5paper-nginx
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
